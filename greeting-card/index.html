<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="styles.css">
 <title>Greeting Card</title>
</head>

<body>

 <header>
  <h1>Leo's Greeting Card</h1>
  <p>My simple CSS project for creating greeting card.</p>
 </header>

 <main>
  <div class="card-box">
   <img src="me.webp" alt="image of me">
   <h2>Happy Birthday! 🥳</h2>
   <p>Hi, I want to greet you a Happy Birthday! More birthdays to come and always be happy.</p>
   <div class="solid-line"></div>
   <div class="input-message-box">
    <label for="message">Message me:</label>
    <textarea name="message" id="message"></textarea>
   </div>
   <div class="solid-line"></div>
  </div>
 </main>

</body>

</html>
